services:
  db:
    image: postgres:17-alpine
    container_name: pinbead-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: pinbead
      POSTGRES_USER: pinbead
      POSTGRES_PASSWORD: pinbead
    ports:
      - "5432:5432"
    volumes:
      - pinbead-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pinbead -d pinbead"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pinbead-postgres-data:
