services:
  db:
    image: postgres:17-alpine
    container_name: pinbead-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: pinbead
      POSTGRES_USER: pinbead
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pinbead-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pinbead -d pinbead"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: zhangxianyuan/yukid-tool:pinbead-latest
    container_name: pinbead-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://pinbead:${POSTGRES_PASSWORD}@db:5432/pinbead?schema=public
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET}
      ADMIN_SESSION_MAX_AGE: ${ADMIN_SESSION_MAX_AGE:-604800}
      ADMIN_COOKIE_SECURE: ${ADMIN_COOKIE_SECURE:-}
      UPLOAD_DIR: /var/lib/pinbead/uploads
      UPLOAD_PUBLIC_BASE_URL: /uploads
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - pinbead-uploads:/var/lib/pinbead/uploads
    command: sh -c "npm run db:deploy && node server.js"

volumes:
  pinbead-postgres-data:
  pinbead-uploads:
